<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry</title>
    <style>
        body { font-family: sans-serif; background-color: #fce4ec; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; max-width: 85%; }
        h1 { color: #d81b60; font-size: 2rem; }
        p { color: #555; font-size: 1rem; line-height: 1.5; }
        .heart { color: #e91e63; font-size: 2.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart">❤️</div>
        <h1>I'm Really Sorry</h1>
        <p>Hey, I value our bond more than anything else. I hate that things got messed up between us, and I sincerely hope you can forgive me. Let's talk?</p>
    </div>
</body>
</html>
